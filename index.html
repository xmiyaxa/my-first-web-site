<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あの自己紹介ページ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.6;
      color: #1f2933;
      background: #f4f6f8;
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .hero {
      padding: 48px 0 40px;
      border-bottom: 1px solid #d9e2ec;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2.8rem;
      line-height: 1.2;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
    }

    .lead {
      max-width: 640px;
      color: #52606d;
      font-size: 1.2rem;
    }

    section {
      padding: 32px 0;
    }

    ul {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li {
      padding: 16px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      font-weight: bold;
    }

    .message {
      padding: 24px;
      border-left: 4px solid #2f80ed;
      background: #ffffff;
      font-size: 1.25rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>あ</h1>
      <p class="lead">大学生です。ディベート、スピーチ、ディスカッションに関心があります。</p>
    </header>

    <section>
      <h2>好きなこと・得意なこと</h2>
      <ul>
        <li>ディベート</li>
        <li>スピーチ</li>
        <li>ディスカッション</li>
      </ul>
    </section>

    <section>
      <h2>メッセージ</h2>
      <p class="message">ディベートやりましょう！</p>
    </section>
  </main>
</body>
</html>
